<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <defs>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Icon portion (centered in 0-100 x range) -->
  <g transform="translate(2, 2) scale(0.75)">
    <!-- Left angle bracket < -->
    <path d="M32 42 L12 64 L32 86" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right angle bracket > -->
    <path d="M96 42 L116 64 L96 86" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sprout stem -->
    <path d="M64 108 C64 108 64 58 64 52" fill="none" stroke="url(#stem)" stroke-width="7" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M64 72 Q44 52 36 40 Q48 58 64 66Z" fill="url(#leaf)"/>
    <!-- Right leaf -->
    <path d="M64 60 Q84 40 92 28 Q80 46 64 54Z" fill="url(#stem)"/>
    <!-- Top bud -->
    <ellipse cx="63" cy="44" rx="7" ry="12" fill="#86efac" transform="rotate(-8 63 44)"/>
    <ellipse cx="65" cy="42" rx="5" ry="10" fill="#bbf7d0" transform="rotate(6 65 42)"/>
    <!-- Soil base -->
    <path d="M44 108 Q64 116 84 108" fill="none" stroke="#a16207" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Text: Code X Farm -->
  <text x="108" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="#7CB342" letter-spacing="-1">
    <tspan>Code</tspan>
    <tspan dx="6">X</tspan>
    <tspan dx="6">Farm</tspan>
  </text>
</svg>
